apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: cicd-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: 084400305795.dkr.ecr.us-east-1.amazonaws.com/backend:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 3001